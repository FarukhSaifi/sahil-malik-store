version: 2
updates:
  # npm — up to 2 open PRs: one for safe minor/patch, one for major (30-day cooldown).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "FarukhSaifi"
    labels:
      - "dependencies"
    open-pull-requests-limit: 2
    versioning-strategy: increase
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # GitHub Actions — minor/patch within current major tag only (@v4, not @v5).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    reviewers:
      - "FarukhSaifi"
    labels:
      - "dependencies"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
